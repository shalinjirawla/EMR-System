        description: "<b>Below is the Request Body description:</b><br><br>  <ol> <li> <p><strong>CHILD ABHA - Create CHILD ABHA</strong></p> <ul> <li><strong>Description:</strong> This API endpoint is used to create a CHILD ABHA number for a minor using their demographic details. The CHILD ABHA number helps in uniquely identifying minors and linking their health records across multiple systems:</li> <li><strong>dayOfBirth:</strong> The day of the userâ€™s birth. <ul> <li><strong>Type:</strong> String</li> <li><strong>Example:</strong> <code>14</code></li> </ul> </li> <li><strong>monthOfBirth:</strong> The month of the userâ€™s birth. <ul> <li><strong>Type:</strong> String</li> <li><strong>Example:</strong> <code>1</code></li> </ul> </li> <li><strong>yearOfBirth:</strong> The year of the userâ€™s birth. <ul> <li><strong>Type:</strong> String</li> <li><strong>Example:</strong> <code>2000</code></li> </ul> </li> <li><strong>name:</strong> The userâ€™s name. <ul> <li><strong>Type:</strong> String</li> <li><strong>Example:</strong> <code>John</code></li> </ul> </li> <li><strong>gender:</strong> The userâ€™s gender. <ul> <li><strong>Type:</strong> String</li> <li><strong>Example:</strong> <code>M</code></li> </ul> </li> <li><strong>name:</strong> The userâ€™s last name. <ul><li><strong>Type:</strong> String</li> <li><strong>Example:</strong> <code>Doe John</code></li> </ul> </li>  <li><strong>stateCode:</strong> The code of the userâ€™s state. <ul> <li><strong>Type:</strong> String</li> <li><strong>Example:</strong> <code>27</code></li> </ul> </li> <li><strong>parentConsent:</strong> Consent of the parent should be true <ul> <li><strong>Type:</strong> String</li> <li><strong>Example:</strong> <code>true</code></li> </ul> </li> </ul> </li> </ul> </li> </ul> </li> <li> <p><strong>Demo Auth API</strong></p> <ul> <li><strong>Description:</strong> This API endpoint is used for the demo authentication of an individual using their Aadhaar number. It verifies the demographic details against the Aadhaar database and generates an ABHA number if the details match.</li> <li><strong>dateOfBirth:</strong> The day of the userâ€™s birth. <ul> <li><strong>Type:</strong> String</li> <li><strong>Example:</strong> <code>18-06-1995</code></li> </ul> </li> <li><strong>districtCode:</strong> The code of the userâ€™s district. <ul> <li><strong>Type:</strong> String</li> <li><strong>Example:</strong> <code>486</code></li> </ul> </li> <li><strong>stateCode:</strong> The code of the userâ€™s state. <ul> <li><strong>Type:</strong> String</li> <li><strong>Example:</strong> <code>1</code></li> </ul> </li> <li><strong>name:</strong> The userâ€™s name. <ul> <li><strong>Type:</strong> String</li> <li><strong>Example:</strong> <code>John Doe</code></li> </ul> </li> <li><strong>gender:</strong> The userâ€™s gender. <ul> <li><strong>Type:</strong> String</li> <li><strong>Example:</strong> <code>M</code></li> </ul> </li> <li><strong>mobile:</strong> The userâ€™s mobile number. <ul> <li><strong>Type:</strong> String</li> <li><strong>Example:</strong> <code>******1234</code></li> </ul> </li> </ul> </li> <li> <p><strong>Create ABHA by Verifying OTP</strong></p> <ul> <li><strong>Description:</strong> This API endpoint is used to create an ABHA (Ayushman Bharat Health Account) number by verifying an OTP sent to the userâ€™s registered mobile number.</li> </ul> </li> <li> <p><strong>Create ABHA Via Biometrics</strong></p> <ul> <li><strong>Description:</strong> This API endpoint is used to create an ABHA (Ayushman Bharat Health Account) number by using users biometrics. In this flow user will be using Aadhaar authentication and biometrics verification(FingerPrint, Face and Iris). </li> </ul> </li> </ol>"

