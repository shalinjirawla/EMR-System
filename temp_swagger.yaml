      description: "This API endpoint is used to generate and send an OTP (One-Time Password) to the userâ€™s registered mobile number. The OTP is essential for verifying the userâ€™s identity and ensuring secure access to the ABHA (Ayushman Bharat Health Account) enrollment process. Depending on the type of identifier provided (Aadhaar Number, ABHA Number, or Mobile Number), the OTP will be generated and sent to the corresponding registered mobile number.\r

        <br> <br> </ol>**Usage of this API for below scenarios: OTP Request**<br><br> **1. AADHAR OTP:**When the user wants to enroll using their Aadhar Number, an OTP is sent to the mobile number registered with their Aadhar linked mobile number. For this pass loginHint as \"Aadhar-number\".   <br>  **2. Mobile OTP:** When the user wants to enroll using their Mobile Number, an OTP is sent to the provided mobile number. For this pass loginHint as \"mobile-number\".<br> **3. DL OTP:** When the user wants to enroll using their DL, an OTP is sent to the mobile number registered with their DL. For this pass loginHint as \"Mobile\".<br><b>Note:</b><br> **1.**OTP will be valid for 10 minute only <br><br>"

