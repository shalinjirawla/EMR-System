<form class="form-horizontal d-flex flex-column h-100" autocomplete="off" #editMedicineModal="ngForm"
  (ngSubmit)="save()">

  <!-- HEADER -->
  <abp-modal-header title="✏️ Edit Medicine" (onCloseClick)="bsModalRef.hide()">
  </abp-modal-header>

  <!-- BODY -->
  <div class="modal-body flex-grow-1 custom-scroll">

    <!-- 🔹 BASIC INFO -->
    <div class="card custom-card mb-3">
      <div class="section-title">💊 Basic Info</div>

      <div class="row mt-2">
        <div class="col-md-12">
          <label class="form-label">Medicine Name</label>
          <input pInputText [(ngModel)]="medicine.name" name="name" class="w-100" placeholder="Enter medicine name"
            required />
        </div>
      </div>

      <div class="row mt-3">
        <div class="col-md-6">
          <label class="form-label">Form</label>
          <p-select [options]="formOptions" optionLabel="name" optionValue="id" [(ngModel)]="medicine.medicineFormId"
            name="medicineFormId" class="w-100" placeholder="Select form" required>
          </p-select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Minimum Stock</label>
          <p-inputNumber [(ngModel)]="medicine.minimumStock" name="minimumStock" class="w-100" placeholder="Enter stock"
            [min]="1" required>
          </p-inputNumber>
        </div>
      </div>
    </div>

    <!-- 🔹 STRENGTH -->
    <div class="card custom-card mb-3">
      <div class="section-title">⚗️ Strength Details</div>

      <div class="row mt-2">
        <div class="col-md-6">
          <label class="form-label">Strength</label>
          <p-inputNumber [(ngModel)]="medicine.strength" name="strength" class="w-100" placeholder="e.g. 500">
          </p-inputNumber>
        </div>

        <div class="col-md-6">
          <label class="form-label">Unit</label>
          <p-select [options]="strengthUnitOptions" optionLabel="name" optionValue="id"
            [(ngModel)]="medicine.strengthUnitId" name="strengthUnitId" class="w-100" placeholder="Select unit">
          </p-select>
        </div>
      </div>
    </div>

    <!-- 🔹 EXTRA -->
    <div class="card custom-card mb-3">
      <div class="section-title">⚙️ Additional Info</div>

      <div class="row mt-2">
        <div class="col-md-12 flex align-items-center gap-2">
          <p-checkbox [(ngModel)]="medicine.isAvailable" name="isAvailable" binary="true">
          </p-checkbox>
          <label>Available</label>
        </div>
      </div>

      <div class="row mt-3">
        <div class="col-md-12">
          <label class="form-label">Description</label>
          <textarea pTextarea [(ngModel)]="medicine.description" name="description" rows="3" class="w-100"
            placeholder="Enter description">
          </textarea>
        </div>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <abp-modal-footer [cancelDisabled]="saving" [saveDisabled]="!isFormValid || saving"
    (onCancelClick)="bsModalRef.hide()">
  </abp-modal-footer>

</form>
