<form class="admission-form" #editAdmissionForm="ngForm" (ngSubmit)="save()" autocomplete="off">

    <!-- HEADER -->
    <abp-modal-header title="Edit Admission" (onCloseClick)="bsModalRef.hide()">
    </abp-modal-header>

    <div class="modal-body custom-body">

        <!-- 👤 Patient -->
        <div class="card-section">
            <h5 class="section-title">👤 Patient Details</h5>

            <div class="row">
                <div class="col-md-6 form-group">
                    <label>Select Patient</label>
                    <p-select [options]="patients" optionLabel="fullName" optionValue="id"
                        [(ngModel)]="admission.patientId" name="patientId" required>
                    </p-select>
                </div>

                <div class="col-md-6 form-group">
                    <label>Admission Type</label>
                    <p-select [(ngModel)]="admission.admissionType" [options]="admissionTypeOptions" optionLabel="label"
                        optionValue="value" name="admissionType" required>
                    </p-select>
                </div>
            </div>
        </div>

        <!-- 👨‍⚕️ Staff -->
        <div class="card-section">
            <h5 class="section-title">👨‍⚕️ Medical Staff</h5>

            <div class="row">
                <div class="col-md-6 form-group">
                    <label>Doctor</label>
                    <p-select [(ngModel)]="admission.doctorId" [options]="doctors" optionLabel="fullName"
                        optionValue="id" name="doctorId" required>
                    </p-select>
                </div>

                <div class="col-md-6 form-group">
                    <label>Nurse</label>
                    <p-select [(ngModel)]="admission.nurseId" [options]="nurses" optionLabel="fullName" optionValue="id"
                        name="nurseId">
                    </p-select>
                </div>
            </div>
        </div>

        <!-- 🏥 Room -->
        <div class="card-section">
            <h5 class="section-title">🏥 Room Allocation</h5>

            <div class="row">
                <div class="col-md-6 form-group">
                    <label>Room</label>
                    <p-select [(ngModel)]="admission.roomId" [options]="roomOptions" optionLabel="label"
                        optionValue="value" name="roomId" [filter]="true" (onChange)="onRoomChange($event.value)"
                        required>
                    </p-select>
                </div>

                <div class="col-md-6 form-group">
                    <label>Bed</label>
                    <p-select [(ngModel)]="admission.bedId" [options]="beds" optionLabel="bedNumber" optionValue="id"
                        name="bedId" [filter]="true">
                    </p-select>
                </div>
            </div>
        </div>

        <!-- 📝 Reason -->
        <div class="card-section">
            <h5 class="section-title">📝 Admission Reason</h5>

            <textarea pTextarea [(ngModel)]="admission.reasonForAdmit" name="reasonForAdmit" rows="3"
                placeholder="Enter reason..." required>
            </textarea>
        </div>

        <!-- 💳 Billing -->
        <div class="card-section">
            <h5 class="section-title">💳 Billing Details</h5>

            <div class="row">
                <div class="col-md-6 form-group">
                    <label>Billing Mode</label>
                    <p-select [(ngModel)]="admission.billingMode" [options]="billingMethodOptions" optionLabel="label"
                        optionValue="value" name="billingMode" required>
                    </p-select>
                </div>

                <div class="col-md-6 form-group" *ngIf="admission.billingMode != BillingMethod._0">
                    <label>Insurance</label>
                    <p-select [(ngModel)]="admission.insuranceId" [options]="insurances" optionLabel="insuranceName"
                        optionValue="id" name="insuranceId" required>
                    </p-select>
                </div>
            </div>

            <div *ngIf="admission.billingMode != BillingMethod._0">

                <div class="row mt-2">
                    <div class="col-md-6 form-group">
                        <label>Policy Number</label>
                        <input type="text" class="form-control" [(ngModel)]="admission.policyNumber" name="policyNumber"
                            required>
                    </div>

                    <div class="col-md-6 form-group">
                        <label>Coverage Limit</label>
                        <input type="number" class="form-control" [(ngModel)]="admission.coverageLimit"
                            name="coverageLimit" required>
                    </div>
                </div>

                <div class="form-group mt-2">
                    <label>Co-Pay %</label>
                    <input type="number" class="form-control" [(ngModel)]="admission.coPayPercentage"
                        name="coPayPercentage">
                </div>

            </div>
        </div>

    </div>

    <!-- FOOTER -->
    <abp-modal-footer [cancelDisabled]="saving" [saveDisabled]="!editAdmissionForm.form.valid || saving"
        (onCancelClick)="bsModalRef.hide()">
    </abp-modal-footer>

</form>
