<form class="emergency-form" #editEmergencyForm="ngForm" (ngSubmit)="save()" autocomplete="off">

    <!-- HEADER -->
    <abp-modal-header title="🚑 Edit Emergency Case" (onCloseClick)="bsModalRef.hide()">
    </abp-modal-header>

    <div class="modal-body custom-body">

        <!-- ✅ ADMITTED STATUS -->
        <div class="status-bar" *ngIf="isAdmitted">
            <i class="pi pi-check-circle"></i>
            <span>Patient Admitted</span>
        </div>

        <!-- 👤 Patient -->
        <div class="card-section emergency">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 class="section-title">👤 Patient</h5>

                <p-button label="+ Add Patient" severity="info" size="small" *ngIf="showAddPatientButton"
                    (onClick)="showCreatePatientDialog()">
                </p-button>
            </div>

            <p-select [options]="patients" optionLabel="fullName" optionValue="id" [(ngModel)]="emergency.patientId"
                name="patientId" placeholder="Select patient"
                [class.ng-invalid]="isPatientRequired && !emergency.patientId">
            </p-select>

            <small class="error-text" *ngIf="isPatientRequired && !emergency.patientId">
                Patient is required when status = Admitted
            </small>
        </div>

        <!-- 👨‍⚕️ Staff -->
        <div class="card-section">
            <h5 class="section-title">👨‍⚕️ Medical Staff</h5>

            <div class="row">
                <div class="col-md-6 form-group">
                    <label>Doctor</label>
                    <p-select [(ngModel)]="emergency.doctorId" [options]="doctors" optionLabel="fullName"
                        optionValue="id" name="doctorId">
                    </p-select>
                </div>

                <div class="col-md-6 form-group">
                    <label>Nurse</label>
                    <p-select [(ngModel)]="emergency.nurseId" [options]="nurses" optionLabel="fullName" optionValue="id"
                        name="nurseId">
                    </p-select>
                </div>
            </div>
        </div>

        <!-- ⚡ Case Details -->
        <div class="card-section">
            <h5 class="section-title">⚡ Case Details</h5>

            <div class="row">
                <div class="col-md-6 form-group">
                    <label>Mode of Arrival</label>
                    <p-select [(ngModel)]="emergency.modeOfArrival" [options]="modeOfArrivalOptions" optionLabel="label"
                        optionValue="value" name="modeOfArrival" (onChange)="onChangeModeOfArrival($event)" required>
                    </p-select>
                </div>

                <div class="col-md-6 form-group">
                    <label>Severity</label>
                    <p-select [(ngModel)]="emergency.severity" [options]="severityOptions" optionLabel="label"
                        optionValue="value" name="severity" required>
                    </p-select>
                </div>
            </div>

            <div class="row mt-2">
                <div class="col-md-6 form-group">
                    <label>Status</label>
                    <p-select [(ngModel)]="emergency.status" [options]="statusOptions" optionLabel="label"
                        optionValue="value" name="status" (onChange)="statusChange($event)" required>
                    </p-select>
                </div>
            </div>
        </div>

    </div>

    <!-- FOOTER -->
    <abp-modal-footer [cancelDisabled]="saving"
        [saveDisabled]="!editEmergencyForm.form.valid || saving || (isPatientRequired && !emergency.patientId)"
        (onCancelClick)="bsModalRef.hide()">
    </abp-modal-footer>

</form>
