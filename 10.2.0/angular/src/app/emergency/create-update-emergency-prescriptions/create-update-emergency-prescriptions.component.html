<form class="form-horizontal d-flex flex-column h-100" autocomplete="off" #emergencyPrescriptionForm="ngForm"
  (ngSubmit)="save()">

  <!-- HEADER -->
  <abp-modal-header [title]="id>0 ? '✏️ Edit Emergency Prescription' : '🆕 Create Emergency Prescription'"
    (onCloseClick)="bsModalRef.hide()">
  </abp-modal-header>

  <!-- BODY -->
  <div class="modal-body flex-grow-1 custom-scroll">

    <!-- 🔹 BASIC INFO CARD -->
    <div class="card custom-card mb-3">
      <div class="card-title">🚑 Emergency Details</div>

      <div class="row">
        <div class="col-md-12">
          <label class="form-label">Emergency Case</label>
          <p-select [options]="emergencyCase" optionLabel="emergencyNumber" optionValue="id"
            [(ngModel)]="prescription.emergencyCaseId" name="emergencyCaseId" class="w-100"
            placeholder="Select emergency case" required>
          </p-select>
        </div>
      </div>

      <div class="row mt-3">
        <div class="col-md-6">
          <label class="form-label">Diagnosis</label>
          <input pInputText [(ngModel)]="prescription.diagnosis" name="diagnosis" class="w-100"
            placeholder="Enter diagnosis" required />
        </div>

        <div class="col-md-6" *ngIf="isAdmin">
          <label class="form-label">Doctor</label>
          <p-select [(ngModel)]="prescription.doctorId" [options]="doctors" optionLabel="fullName" optionValue="id"
            name="doctorId" class="w-100" placeholder="Select doctor" required>
          </p-select>
        </div>
      </div>
    </div>

    <!-- 🔹 LAB + PROCEDURES -->
    <div class="card custom-card mb-3">
      <div class="card-title">🧪 Tests & Procedures</div>

      <div class="row">
        <div class="col-md-12">
          <label class="form-label">Lab Tests</label>
          <p-multiSelect [(ngModel)]="selectedLabTests" [options]="labTests" optionLabel="name" display="chip"
            class="w-100" name="labTests" placeholder="Select lab tests">
          </p-multiSelect>
        </div>
      </div>

      <div class="row mt-3">
        <div class="col-md-12">
          <label class="form-label">Procedures</label>
          <p-multiSelect [(ngModel)]="selectedProcedures" [options]="_procedures" optionLabel="name" optionValue="id"
            display="chip" class="w-100" name="procedures" placeholder="Select procedures">
          </p-multiSelect>
        </div>
      </div>
    </div>

    <!-- 🔹 FLAGS -->
    <div class="card custom-card mb-3">
      <div class="card-title">⚙️ Options</div>

      <div class="row">
        <div class="col-md-6 flex align-items-center gap-2">
          <p-checkbox [(ngModel)]="prescription.isFollowUpRequired" name="isFollowUpRequired"
            binary="true"></p-checkbox>
          <label>Follow-up Required</label>
        </div>

        <div class="col-md-6 flex align-items-center gap-2">
          <p-checkbox [(ngModel)]="prescription.isSpecialAdviceRequired" name="isSpecialAdviceRequired" binary="true"
            (onChange)="onChangeSpecialAdvice($event)">
          </p-checkbox>
          <label>Special Advice Required</label>
        </div>
      </div>
    </div>

    <!-- 🔹 SPECIAL ADVICE -->
    <div class="card custom-card mb-3" *ngIf="_isSpecialAdviceRequired">
      <div class="card-title">👨‍⚕️ Specialist Referral</div>

      <div class="row">
        <div class="col-md-6">
          <label class="form-label">Department</label>
          <p-select [(ngModel)]="prescription.departmentId" [options]="departmentList" optionLabel="departmentName"
            optionValue="id" name="departmentId" class="w-100" (onChange)="OnSelectDepartMent($event)">
          </p-select>
        </div>

        <div class="col-md-6" *ngIf="_isSpecialDepartMentSelect">
          <label class="form-label">Specialist Doctor</label>
          <p-select [(ngModel)]="prescription.specialistDoctorId" [options]="departmentWiseDoctor"
            optionLabel="fullName" optionValue="id" name="specialistDoctorId" class="w-100">
          </p-select>
        </div>
      </div>

      <div class="row mt-3" *ngIf="_isSpecialDepartMentSelect">
        <div class="col-md-12">
          <textarea pTextarea [(ngModel)]="prescription.createUpdateConsultationRequests.notes" name="notes" rows="2"
            class="w-100" placeholder="Notes for specialist doctor">
          </textarea>
        </div>
      </div>
    </div>

    <!-- 🔹 MEDICINE ENTRY CARD -->
    <div class="card custom-card mb-3">
      <div class="card-title">💊 Add Medication</div>
      <div class="row align-items-end g-3">
        <div class="col-md-5">
          <label class="form-label">Medicine</label>
          <p-autoComplete [(ngModel)]="selectedMedicine" [suggestions]="filteredMedicines"
            (completeMethod)="searchMedicine($event)" field="medicineName" [dropdown]="true" [virtualScroll]="true"
            [lazy]="true" [itemSize]="34" placeholder="Search medicine..." name="medicine" class="w-100">
          </p-autoComplete>
        </div>
        <div class="col-md-2">
          <label class="form-label">Frequency</label>
          <input type="text" pInputText [(ngModel)]="frequencyInput" placeholder="1-0-1" name="frequency" maxlength="7"
            (input)="formatFrequency()" class="w-100" />
        </div>
        <div class="col-md-2">
          <label class="form-label">Qty</label>
          <input type="number" pInputText [(ngModel)]="numberOfMedicine" name="numberOfMedicine" min="1"
            class="w-100" />
        </div>
        <div class="col-md-3">
          <p-button [label]="editIndex >= 0 ? 'Update Medicine' : 'Add Medicine'"
            [icon]="editIndex >= 0 ? 'pi pi-check' : 'pi pi-plus'" (click)="addMedicineToList()" styleClass="w-100"
            [severity]="editIndex >= 0 ? 'success' : 'info'" />
        </div>
      </div>
    </div>

    <!-- 🔹 ADDED MEDICINES TABLE -->
    <div class="table-container mb-4" *ngIf="prescription.items.length > 0">
      <div class="p-3 border-bottom bg-light d-flex justify-content-between align-items-center">
        <h6 class="mb-0 font-weight-bold text-dark">Added Medications</h6>
        <span class="badge rounded-pill bg-primary shadow-sm">{{prescription.items.length}} items</span>
      </div>
      <div class="table-responsive">
        <table class="table mb-0">
          <thead>
            <tr>
              <th class="text-center" style="width: 50px;">#</th>
              <th>Medicine</th>
              <th>Frequency</th>
              <th class="text-center" style="width: 80px;">Qty</th>
              <th class="text-center" style="width: 100px;">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of prescription.items; let i = index">
              <td class="text-center text-muted">{{i + 1}}</td>
              <td>
                <div class="fw-bold text-dark">{{item.medicineName}}</div>
                <small class="text-muted">{{item.dosage}}</small>
              </td>
              <td>
                <span class="badge border bg-light text-dark fw-normal px-2 py-1">{{item.frequency}}</span>
              </td>
              <td class="text-center">{{item.numberOfMedicine}}</td>
              <td class="text-center">
                <div class="d-flex justify-content-center gap-1">
                  <p-button icon="pi pi-pencil" [text]="true" severity="info" (click)="editItem(i)" pTooltip="Edit" />
                  <p-button icon="pi pi-trash" [text]="true" severity="danger" (click)="deleteItem(i)"
                    pTooltip="Remove" />
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <abp-modal-footer [cancelDisabled]="saving" [saveDisabled]="isSaveDisabled()" (onCancelClick)="bsModalRef.hide()">
  </abp-modal-footer>

</form>
