<form class="form-horizontal d-flex flex-column h-100" autocomplete="off" #createAppoinmentModal="ngForm"
  (ngSubmit)="save()">

  <!-- HEADER -->
  <abp-modal-header title="📅 Create New Appointment" (onCloseClick)="bsModalRef.hide()">
  </abp-modal-header>

  <!-- BODY -->
  <div class="modal-body flex-grow-1 custom-scroll">

    <!-- 🔹 ACTION BAR -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="section-title">👤 Patient Details</div>

      <p-button label="Add Patient" icon="pi pi-user-plus" severity="info" variant="outlined"
        *ngIf="showAddPatientButton" (onClick)="showCreatePatientDialog()">
      </p-button>
    </div>

    <!-- 🔹 PATIENT CARD -->
    <div class="card custom-card mb-3">
      <div class="row">
        <div class="col-md-6">
          <label class="form-label">Select Patient</label>
          <p-select [options]="patients" optionLabel="fullName" optionValue="id" [(ngModel)]="appointment.patientId"
            (onChange)="onPatientChange($event.value)" name="patientId" class="w-100" placeholder="Choose patient"
            required>
          </p-select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Appointment Type</label>
          <p-select [options]="appointmentTypes" optionLabel="name" optionValue="id"
            [(ngModel)]="appointment.appointmentTypeId" name="appointmentTypeId" class="w-100" placeholder="Select type"
            required>
          </p-select>
        </div>
      </div>
    </div>

    <!-- 🔹 DOCTOR SELECTION -->
    <div class="card custom-card mb-3">
      <div class="section-title">🩺 Doctor Assignment</div>

      <div class="row mt-2">
        <div class="col-md-6">
          <label class="form-label">Department</label>
          <p-select [options]="departments" optionLabel="departmentName" optionValue="id"
            [(ngModel)]="appointment.departmentId" (onChange)="onSelectDepartment($event)" name="departmentId"
            class="w-100" placeholder="Select department" required>
          </p-select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Doctor</label>
          <p-select [options]="departmentWiseDoctor" optionLabel="fullName" optionValue="id"
            [(ngModel)]="appointment.doctorId" name="doctorId" class="w-100" placeholder="Select doctor" required>
          </p-select>
        </div>
      </div>
    </div>

    <!-- 🔹 SCHEDULE -->
    <div class="card custom-card mb-3">
      <div class="section-title">⏰ Schedule</div>

      <div class="row mt-2">
        <div class="col-md-6">
          <label class="form-label">Status</label>
          <p-select [options]="statusOptions" optionLabel="label" optionValue="value" [(ngModel)]="appointment.status"
            name="status" class="w-100" placeholder="Select status" required>
          </p-select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Appointment Date</label>
          <p-datepicker [(ngModel)]="appointment.appointmentDate" name="appointmentDate" [showIcon]="true"
            [minDate]="today" class="w-100" placeholder="Select date" required>
          </p-datepicker>
        </div>
      </div>
    </div>

    <!-- 🔹 PAYMENT -->
    <div class="card custom-card mb-3" *ngIf="!isPatientAdmitted">
      <div class="section-title">💳 Payment Method</div>

      <div class="payment-toggle mt-2">
        <div class="payment-option" [class.active]="appointment.paymentMethod === 1" (click)="togglePaymentMethod(1)">
          💳 Card
        </div>

        <div class="payment-option" [class.active]="appointment.paymentMethod === 0" (click)="togglePaymentMethod(0)">
          💵 Cash
        </div>
      </div>
    </div>

    <!-- 🔹 EXTRA -->
    <div class="card custom-card mb-3">
      <div class="section-title">⚙️ Additional Info</div>

      <div class="row mt-2">
        <div class="col-md-12 flex align-items-center gap-2">
          <p-checkbox [(ngModel)]="appointment.isFollowUp" name="isFollowUp" binary="true">
          </p-checkbox>
          <label>Follow-up Appointment</label>
        </div>
      </div>

      <div class="row mt-3">
        <div class="col-md-12">
          <label class="form-label">Reason</label>
          <textarea pTextarea [(ngModel)]="appointment.reasonForVisit" name="reasonForVisit" rows="3" class="w-100"
            placeholder="Enter reason for visit" required>
          </textarea>
        </div>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <abp-modal-footer [cancelDisabled]="saving" [saveDisabled]="!isFormValid || saving"
    (onCancelClick)="bsModalRef.hide()">
  </abp-modal-footer>

</form>
