<form class="form-horizontal d-flex flex-column h-100" autocomplete="off" #createVitalForm="ngForm" (ngSubmit)="save()">

  <!-- HEADER -->
  <abp-modal-header title="🩺 Record Vitals" (onCloseClick)="bsModalRef.hide()">
  </abp-modal-header>

  <!-- BODY -->
  <div class="modal-body flex-grow-1 custom-scroll">

    <!-- 🔹 PATIENT + NURSE -->
    <div class="card custom-card mb-3">
      <div class="section-title">👤 Patient Info</div>

      <div class="row mt-2">
        <div class="col-md-6">
          <label class="form-label">Patient</label>
          <p-select [options]="patients" optionLabel="fullName" optionValue="id" [(ngModel)]="vital.patientId"
            name="patientId" class="w-100" required>
          </p-select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Nurse</label>
          <p-select [options]="nurses" optionLabel="fullName" optionValue="id" [(ngModel)]="vital.nurseId"
            name="nurseId" class="w-100" required>
          </p-select>
        </div>
      </div>
    </div>

    <!-- 🔹 CORE VITALS -->
    <div class="card custom-card mb-3">
      <div class="section-title">❤️ Core Vitals</div>

      <div class="row mt-2">
        <div class="col-md-4">
          <label class="form-label">Blood Pressure</label>
          <input type="text" pInputText [(ngModel)]="vital.bloodPressure" name="bloodPressure" placeholder="120/80"
            required />
        </div>

        <div class="col-md-4">
          <label class="form-label">Heart Rate</label>
          <input type="number" pInputText [(ngModel)]="vital.heartRate" name="heartRate" placeholder="bpm" required />
        </div>

        <div class="col-md-4">
          <label class="form-label">Temperature</label>
          <input type="number" pInputText [(ngModel)]="vital.temperature" name="temperature" step="0.1" placeholder="°C"
            required />
        </div>
      </div>

      <div class="row mt-3">
        <div class="col-md-6">
          <label class="form-label">Respiration Rate</label>
          <input type="number" pInputText [(ngModel)]="vital.respirationRate" name="respirationRate"
            placeholder="breaths/min" required />
        </div>

        <div class="col-md-6">
          <label class="form-label">Oxygen Saturation</label>
          <input type="number" pInputText [(ngModel)]="vital.oxygenSaturation" name="oxygenSaturation" placeholder="%"
            required />
        </div>
      </div>
    </div>

    <!-- 🔹 BODY MEASUREMENTS -->
    <div class="card custom-card mb-3">
      <div class="section-title">📏 Body Measurements</div>

      <div class="row mt-2">
        <div class="col-md-4">
          <label class="form-label">Height (cm)</label>
          <input type="number" pInputText [(ngModel)]="vital.height" name="height" />
        </div>

        <div class="col-md-4">
          <label class="form-label">Weight (kg)</label>
          <input type="number" pInputText [(ngModel)]="vital.weight" name="weight" />
        </div>

        <div class="col-md-4">
          <label class="form-label">BMI</label>
          <input type="text" pInputText [(ngModel)]="vital.bmi" name="bmi" placeholder="Auto / Manual" />
        </div>
      </div>
    </div>

    <!-- 🔹 NOTES -->
    <div class="card custom-card mb-3">
      <div class="section-title">📝 Notes</div>

      <textarea pTextarea [(ngModel)]="vital.notes" name="notes" rows="3" class="w-100"
        placeholder="Additional observations...">
      </textarea>
    </div>

  </div>

  <!-- FOOTER -->
  <abp-modal-footer [cancelDisabled]="saving" [saveDisabled]="!createVitalForm.valid || saving"
    (onCancelClick)="bsModalRef.hide()">
  </abp-modal-footer>

</form>
