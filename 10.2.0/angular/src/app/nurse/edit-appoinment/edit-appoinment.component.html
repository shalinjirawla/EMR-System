<form class="form-horizontal d-flex flex-column h-100" autocomplete="off" #editAppoinmentForm="ngForm"
  (ngSubmit)="save()">

  <!-- HEADER -->
  <abp-modal-header title="✏️ Edit Appointment" (onCloseClick)="bsModalRef.hide()">
  </abp-modal-header>

  <!-- BODY -->
  <div class="modal-body flex-grow-1 custom-scroll">

    <!-- 🔹 PATIENT INFO (READ ONLY) -->
    <div class="card custom-card mb-3 readonly-card">
      <div class="section-title">👤 Patient Info</div>

      <div class="row mt-2">
        <div class="col-md-12">
          <label class="form-label">Patient</label>
          <p-select [options]="patients" optionLabel="fullName" optionValue="id" [(ngModel)]="appointment.patientId"
            name="patientId" class="w-100" [disabled]="true">
          </p-select>
        </div>
      </div>
    </div>

    <!-- 🔹 DOCTOR INFO (READ ONLY) -->
    <div class="card custom-card mb-3 readonly-card">
      <div class="section-title">🩺 Doctor Info</div>

      <div class="row mt-2">
        <div class="col-md-6">
          <label class="form-label">Department</label>
          <p-select [options]="departments" optionLabel="departmentName" optionValue="id"
            [(ngModel)]="appointment.departmentId" name="departmentId" class="w-100" [disabled]="true">
          </p-select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Doctor</label>
          <p-select [options]="departmentWiseDoctors" optionLabel="fullName" optionValue="id"
            [(ngModel)]="appointment.doctorId" name="doctorId" class="w-100" [disabled]="true">
          </p-select>
        </div>
      </div>
    </div>

    <!-- 🔹 EDITABLE DETAILS -->
    <div class="card custom-card mb-3">
      <div class="section-title">⚙️ Editable Details</div>

      <div class="row mt-2">
        <div class="col-md-6">
          <label class="form-label">Appointment Type</label>
          <p-select [options]="appointmentTypes" optionLabel="name" optionValue="id"
            [(ngModel)]="appointment.appointmentTypeId" name="appointmentTypeId" class="w-100" required>
          </p-select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Status</label>
          <p-select [options]="statusOptions" optionLabel="label" optionValue="value" [(ngModel)]="appointment.status"
            name="status" class="w-100" required>
          </p-select>
        </div>
      </div>

      <div class="row mt-3">
        <div class="col-md-12">
          <label class="form-label">Appointment Date</label>
          <p-datepicker [(ngModel)]="appointment.appointmentDate" name="appointmentDate" [showIcon]="true"
            [minDate]="today" class="w-100" required>
          </p-datepicker>
        </div>
      </div>
    </div>

    <!-- 🔹 EXTRA -->
    <div class="card custom-card mb-3">
      <div class="section-title">📝 Additional Info</div>

      <div class="row mt-2">
        <div class="col-md-12 flex align-items-center gap-2">
          <p-checkbox [(ngModel)]="appointment.isFollowUp" name="isFollowUp" binary="true">
          </p-checkbox>
          <label>Follow-up Appointment</label>
        </div>
      </div>

      <div class="row mt-3">
        <div class="col-md-12">
          <label class="form-label">Reason for Visit</label>
          <textarea pTextarea [(ngModel)]="appointment.reasonForVisit" name="reasonForVisit" rows="3" class="w-100"
            placeholder="Enter reason" required>
          </textarea>
        </div>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <abp-modal-footer [cancelDisabled]="saving" [saveDisabled]="isSaveDisabled()" (onCancelClick)="bsModalRef.hide()">
  </abp-modal-footer>

</form>
