<div class="form-container">

  <!-- Loader -->
  <div class="overlay" *ngIf="isSaving">
    <p-progressSpinner></p-progressSpinner>
  </div>

  <form class="form-layout" autocomplete="off" #createLabReportForm="ngForm" (ngSubmit)="save()">

    <abp-modal-header title="Create Lab Report" (onCloseClick)="bsModalRef.hide()">
    </abp-modal-header>

    <div class="modal-body custom-body">

      <!-- Patient -->
      <div class="form-card">
        <h6 class="section-title">Patient Details</h6>

        <label>Select Patient</label>
        <p-select [options]="patients" optionLabel="fullName" [optionValue]="'id'" [(ngModel)]="selectedPatient"
          name="patientId" (onChange)="onPatientChange()" class="w-100" required>
        </p-select>
      </div>

      <!-- Source -->
      <div class="form-card">
        <h6 class="section-title">Source</h6>

        <p-select [options]="[
            { label: 'OPD', value: LabTestSource._0 },
            { label: 'Direct', value: LabTestSource._1 }
          ]" optionLabel="label" optionValue="value" [(ngModel)]="labTestSource" name="labTestSource"
          (onChange)="onLabTestSourceChange()" class="w-100" placeholder="Select Source" required>
        </p-select>

        <!-- Prescription -->
        <div class="mt-3" *ngIf="labTestSource === LabTestSource._0">
          <label>Select Prescription</label>
          <p-select [options]="prescriptions" optionLabel="prescriptionName" optionValue="id"
            [(ngModel)]="selectedPrescription" name="prescriptionId" (onChange)="onPrescriptionChange($event.value)"
            class="w-100" placeholder="Select Prescription" required>
          </p-select>
        </div>
      </div>

      <!-- Lab Tests -->
      <div class="form-card">
        <h6 class="section-title">Lab Tests</h6>

        <p-multiSelect [options]="labTests" optionValue="uniqueId" optionLabel="name" [(ngModel)]="selectedLabTests"
          name="labTests" (onChange)="onLabTestsChange()" class="w-100" placeholder="Select Tests"
          selectedItemsLabel="{0} selected">

          <ng-template let-test pTemplate="item">
            <div class="test-item" [class.disabled]="test.disabled">
              <span>{{ test.name }}</span>
              <span class="price">₹{{ test.price }}</span>
              <small *ngIf="test.disabled">(Included)</small>
            </div>
          </ng-template>

        </p-multiSelect>
      </div>

      <!-- Suggestions -->
      <div class="form-card" *ngIf="suggestions.length">
        <h6 class="section-title">Suggested Packages</h6>

        <div *ngFor="let s of suggestions" class="suggestion-card">
          <div>
            <strong>{{ s.packageName }}</strong>
            <div class="price">₹{{ s.packagePrice }}</div>
          </div>

          <button pButton type="button" label="Use" (click)="replaceTests(s)" class="p-button-sm p-button-info">
          </button>
        </div>
      </div>

      <!-- Selected Tests -->
      <div class="form-card" *ngIf="selectedTestDetails.length">
        <h6 class="section-title">Selected Tests</h6>

        <div class="selected-test" *ngFor="let test of selectedTestDetails">
          <span>{{ test.name }}</span>
          <span>₹{{ test.price }}</span>
        </div>

        <div class="total-box">
          Total: ₹{{ selectedTestsTotalPrice }}
        </div>
      </div>

      <!-- Payment -->
      <div class="form-card">
        <h6 class="section-title">Payment Method</h6>

        <div class="payment-container">
          <div class="payment-option" [class.active]="paymentMethod === PaymentMethod._1"
            (click)="setPaymentMethod(PaymentMethod._1)">
            💳 Card
          </div>

          <div class="payment-option" [class.active]="paymentMethod === PaymentMethod._0"
            (click)="setPaymentMethod(PaymentMethod._0)">
            💵 Cash
          </div>
        </div>
      </div>

    </div>

    <abp-modal-footer [cancelDisabled]="isSaving"
      [saveDisabled]="!createLabReportForm.form.valid || !selectedLabTests.length || isSaving"
      (onCancelClick)="bsModalRef.hide()">

      <ng-container *ngIf="isSaving">
        <i class="pi pi-spin pi-spinner"></i> Saving...
      </ng-container>

    </abp-modal-footer>

  </form>
</div>
