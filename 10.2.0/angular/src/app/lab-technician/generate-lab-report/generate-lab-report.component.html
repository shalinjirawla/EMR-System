<form class="lab-report-form d-flex flex-column h-100" autocomplete="off" #labResultForm="ngForm" (ngSubmit)="save()">

    <abp-modal-header title="Generate Lab Report - {{testName}}" (onCloseClick)="bsModalRef.hide()">
    </abp-modal-header>

    <div class="modal-body flex-grow-1">

        <!-- Patient Card -->
        <div class="patient-card">
            <div class="patient-left">
                <div class="avatar">👤</div>
                <div>
                    <div class="patient-name">{{ patientName }}</div>
                    <div class="patient-sub">Lab Test: {{ testName }}</div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="table-container" *ngIf="labReportItems.length > 0">
            <table class="lab-report-table">
                <thead>
                    <tr>
                        <th>Test</th>
                        <th>Range</th>
                        <th>Result</th>
                        <th>Unit</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    <tr *ngFor="let item of labReportItems; let i = index"
                        [ngClass]="{'abnormal': item.flag === 'High' || item.flag === 'Low'}">

                        <td class="test-name">
                            {{ item.test }}
                        </td>

                        <td class="range">
                            {{ item.minValue }} - {{ item.maxValue }}
                        </td>

                        <td>
                            <input type="text" pInputText [(ngModel)]="item.result" [name]="'itemResult' + i"
                                (ngModelChange)="onResultChange(item)" class="result-input" placeholder="Enter value" />
                        </td>

                        <td>{{ item.unit }}</td>

                        <td>
                            <p-tag [severity]="getSeverity(item.flag)" [value]="item.flag || 'Pending'">
                            </p-tag>
                        </td>

                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <abp-modal-footer [cancelDisabled]="saving" [saveDisabled]="isSaveDisabled()" (onCancelClick)="bsModalRef.hide()">
    </abp-modal-footer>

</form>
